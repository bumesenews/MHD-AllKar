# Install: sudo cp deploy/nginx-mhd-api.conf /etc/nginx/sites-available/mhd-api
#          sudo ln -sf /etc/nginx/sites-available/mhd-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with a domain pointing to 88.198.191.204, then:
#   sudo certbot --nginx -d YOUR_DOMAIN

limit_req_zone $binary_remote_addr zone=mhd_api:10m rate=10r/s;

upstream mhd_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name 88.198.191.204 YOUR_DOMAIN;

    # Hide nginx version
    server_tokens off;

    client_max_body_size 32k;

    location / {
        limit_req zone=mhd_api burst=40 nodelay;

        proxy_pass http://mhd_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        limit_req zone=mhd_api burst=5 nodelay;
        proxy_pass http://mhd_api;
        proxy_set_header Host $host;
        access_log off;
    }
}
